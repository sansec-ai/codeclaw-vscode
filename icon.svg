<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- WeChat chat bubble (left) with tail -->
  <path d="M8 2.5C4.4 2.5 1.5 5 1.5 8c0 1.7.9 3.2 2.2 4.1l-.4 1.6c0 .2.2.3.3.3l1.5-.9c.6.2 1.2.3 1.9.3C10.1 13.4 13 11 13 8S11.6 2.5 8 2.5z"
        stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- 3 chat dots -->
  <circle cx="5" cy="8" r="0.75" fill="currentColor"/>
  <circle cx="7.5" cy="8" r="0.75" fill="currentColor"/>
  <circle cx="10" cy="8" r="0.75" fill="currentColor"/>

  <!-- Terminal window (right-top, overlapping bubble) -->
  <rect x="10.5" y="4.5" width="12" height="12" rx="2" stroke="currentColor" stroke-width="1.5" fill="none"/>
  <!-- Terminal >_ prompt -->
  <path d="M12.5 9.5l1.2 1.5-1.2 1.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <line x1="15" y1="12.5" x2="17.5" y2="12.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
  <!-- Cursor blink line -->
  <line x1="12.5" y1="15" x2="20" y2="15" stroke="currentColor" stroke-width="0.8" stroke-linecap="round" opacity="0.4"/>
  <line x1="12.5" y1="16.5" x2="18" y2="16.5" stroke="currentColor" stroke-width="0.8" stroke-linecap="round" opacity="0.3"/>
</svg>
